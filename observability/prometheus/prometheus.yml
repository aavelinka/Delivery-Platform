global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: delivery-platform
    metrics_path: /metrics
    static_configs:
      - targets:
          - api-gateway:8000
          - admin-service:8000
          - auth-service:8000
          - user-service:8000
          - order-service:8000
          - courier-service:8000
          - tracking-service:8000
          - notification-service:8000
          - payment-service:8000
