name: CI

on:
  push:
  pull_request:

jobs:
  service-checks:
    runs-on: ubuntu-latest
    services:
      orders-postgres:
        image: postgres:16
        env:
          POSTGRES_DB: orders
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5438:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d orders"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      couriers-postgres:
        image: postgres:16
        env:
          POSTGRES_DB: couriers
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d couriers"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      notifications-postgres:
        image: postgres:16
        env:
          POSTGRES_DB: notifications
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d notifications"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      auth-postgres:
        image: postgres:16
        env:
          POSTGRES_DB: auth
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5435:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d auth"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      users-postgres:
        image: postgres:16
        env:
          POSTGRES_DB: users
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5436:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d users"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      tracking-postgres:
        image: postgres:16
        env:
          POSTGRES_DB: tracking
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5437:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tracking"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      payments-postgres:
        image: postgres:16
        env:
          POSTGRES_DB: payments
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5439:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d payments"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - api-gateway
          - admin-service
          - order-service
          - courier-service
          - notification-service
          - payment-service
          - user-service
          - tracking-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Packaging Tooling
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install common package
        run: python -m pip install ./libs/platform-common

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: python -m pip install -e ".[dev]"

      - name: Ruff
        working-directory: services/${{ matrix.service }}
        run: python -m ruff check .

      - name: Mypy
        working-directory: services/${{ matrix.service }}
        run: python -m mypy app

      - name: Pytest
        working-directory: services/${{ matrix.service }}
        run: python -m pytest

  gateway-e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Bootstrap venv
        run: make bootstrap

      - name: Install repository dependencies
        run: make install

      - name: Ruff e2e tests
        run: .venv/bin/python -m ruff check tests/e2e

      - name: Gateway e2e
        run: make test-e2e-gateway

  kafka-contracts:
    runs-on: ubuntu-latest
    services:
      orders-postgres:
        image: postgres:16
        env:
          POSTGRES_DB: orders
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5438:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d orders"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      couriers-postgres:
        image: postgres:16
        env:
          POSTGRES_DB: couriers
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d couriers"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      notifications-postgres:
        image: postgres:16
        env:
          POSTGRES_DB: notifications
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d notifications"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      tracking-postgres:
        image: postgres:16
        env:
          POSTGRES_DB: tracking
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5437:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tracking"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      payments-postgres:
        image: postgres:16
        env:
          POSTGRES_DB: payments
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5439:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d payments"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Bootstrap venv
        run: make bootstrap

      - name: Install repository dependencies
        run: make install

      - name: Ruff platform-common tests
        run: .venv/bin/python -m ruff check tests/platform_common

      - name: Platform common tests
        run: .venv/bin/python -m pytest -q tests/platform_common

      - name: Kafka contracts
        run: .venv/bin/python -m pytest -q tests/contracts/test_kafka_contracts.py
