name: CI

on:
  push:
  pull_request:

jobs:
  service-checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - api-gateway
          - order-service
          - courier-service
          - notification-service
          - user-service
          - tracking-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install common package
        run: python -m pip install -e libs/platform-common

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: python -m pip install -e ".[dev]"

      - name: Ruff
        working-directory: services/${{ matrix.service }}
        run: python -m ruff check .

      - name: Mypy
        working-directory: services/${{ matrix.service }}
        run: python -m mypy app

      - name: Pytest
        working-directory: services/${{ matrix.service }}
        run: python -m pytest
