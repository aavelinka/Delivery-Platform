x-observability-runtime-env: &observability-runtime-env
  OTEL_ENABLED: "true"
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector:4318/v1/traces
  OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
  OTEL_EXPORTER_OTLP_TIMEOUT: ${OTEL_EXPORTER_OTLP_TIMEOUT:-10}

services:
  api-gateway:
    environment:
      <<: *observability-runtime-env

  admin-service:
    environment:
      <<: *observability-runtime-env

  auth-service:
    environment:
      <<: *observability-runtime-env

  user-service:
    environment:
      <<: *observability-runtime-env

  order-service:
    environment:
      <<: *observability-runtime-env

  courier-service:
    environment:
      <<: *observability-runtime-env

  tracking-service:
    environment:
      <<: *observability-runtime-env

  notification-service:
    environment:
      <<: *observability-runtime-env

  payment-service:
    environment:
      <<: *observability-runtime-env

  otel-collector:
    image: ${OTEL_COLLECTOR_IMAGE:-otel/opentelemetry-collector-contrib:0.107.0}
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    depends_on:
      jaeger:
        condition: service_started
    volumes:
      - ./observability/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "${OTEL_COLLECTOR_OTLP_GRPC_HOST_PORT:-4317}:4317"
      - "${OTEL_COLLECTOR_OTLP_HTTP_HOST_PORT:-4318}:4318"

  jaeger:
    image: ${JAEGER_IMAGE:-jaegertracing/all-in-one:1.58}
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${JAEGER_UI_HOST_PORT:-16686}:16686"

  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v2.53.1}
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:11.1.4}
    depends_on:
      prometheus:
        condition: service_started
      jaeger:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_DEFAULT_THEME: light
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_DASHBOARDS_MIN_REFRESH_INTERVAL: 5s
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"

volumes:
  grafana_data:
  prometheus_data:
