services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: notifications
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notifications"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.9.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2183:2181"

  kafka:
    image: confluentinc/cp-kafka:7.9.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_BROKER_ID: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9094:9092"

  notification-service:
    build:
      context: ../..
      dockerfile: services/notification-service/Dockerfile
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      NOTIFICATION_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/notifications
      NOTIFICATION_KAFKA_ENABLED: "true"
      NOTIFICATION_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      NOTIFICATION_KAFKA_CLIENT_ID: notification-service
      NOTIFICATION_KAFKA_GROUP_ID: notification-service
      NOTIFICATION_KAFKA_TOPICS: '["orders.events","couriers.events"]'
      NOTIFICATION_JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY}
      NOTIFICATION_GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET:?set GATEWAY_INTERNAL_SECRET}
      NOTIFICATION_SERVICE_NAME: notification-service
      NOTIFICATION_ENVIRONMENT: local
    ports:
      - "8002:8000"
