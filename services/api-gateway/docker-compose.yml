x-observability-env: &observability-env
  OTEL_ENABLED: ${OTEL_ENABLED:-false}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-}
  OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
  OTEL_EXPORTER_OTLP_TIMEOUT: ${OTEL_EXPORTER_OTLP_TIMEOUT:-10}

services:
  api-gateway:
    build:
      context: ../..
      dockerfile: services/api-gateway/Dockerfile
    environment:
      <<: *observability-env
      GATEWAY_JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY}
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET:?set GATEWAY_INTERNAL_SECRET}
      GATEWAY_AUTH_SERVICE_URL: http://host.docker.internal:${AUTH_SERVICE_HOST_PORT:-8003}
      GATEWAY_ORDER_SERVICE_URL: http://host.docker.internal:${ORDER_SERVICE_HOST_PORT:-8000}
      GATEWAY_COURIER_SERVICE_URL: http://host.docker.internal:${COURIER_SERVICE_HOST_PORT:-8001}
      GATEWAY_NOTIFICATION_SERVICE_URL: http://host.docker.internal:${NOTIFICATION_SERVICE_HOST_PORT:-8002}
      GATEWAY_USER_SERVICE_URL: http://host.docker.internal:${USER_SERVICE_HOST_PORT:-8004}
      GATEWAY_TRACKING_SERVICE_URL: http://host.docker.internal:${TRACKING_SERVICE_HOST_PORT:-8005}
      GATEWAY_ADMIN_SERVICE_URL: http://host.docker.internal:${ADMIN_SERVICE_HOST_PORT:-8006}
      GATEWAY_PAYMENT_SERVICE_URL: http://host.docker.internal:${PAYMENT_SERVICE_HOST_PORT:-8007}
      GATEWAY_REQUEST_TIMEOUT_SECONDS: 30
      GATEWAY_RETRY_ATTEMPTS: 2
      GATEWAY_RETRY_BACKOFF_SECONDS: 0.2
      GATEWAY_RATE_LIMIT_REQUESTS: 120
      GATEWAY_RATE_LIMIT_WINDOW_SECONDS: 60
      GATEWAY_SERVICE_NAME: api-gateway
      GATEWAY_ENVIRONMENT: local
    ports:
      - "${API_GATEWAY_HOST_PORT:-8080}:8000"
