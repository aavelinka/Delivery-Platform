services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: couriers
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d couriers"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: bitnami/zookeeper:3.9
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
    ports:
      - "2182:2181"

  kafka:
    image: bitnami/kafka:3.7
    depends_on:
      - zookeeper
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_CFG_BROKER_ID: 1
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9093:9092"

  courier-service:
    build:
      context: ../..
      dockerfile: services/courier-service/Dockerfile
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      COURIER_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/couriers
      COURIER_KAFKA_ENABLED: "true"
      COURIER_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      COURIER_KAFKA_CLIENT_ID: courier-service
      COURIER_KAFKA_GROUP_ID: courier-service
      COURIER_KAFKA_COURIERS_TOPIC: couriers.events
      COURIER_KAFKA_ORDERS_TOPIC: orders.events
      COURIER_JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY}
      COURIER_GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET:?set GATEWAY_INTERNAL_SECRET}
      COURIER_SERVICE_NAME: courier-service
      COURIER_ENVIRONMENT: local
    ports:
      - "8001:8000"
