services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: tracking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tracking"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: bitnami/zookeeper:3.9
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
    ports:
      - "2184:2181"

  kafka:
    image: bitnami/kafka:3.7
    depends_on:
      - zookeeper
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_CFG_BROKER_ID: 1
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9095:9092"

  tracking-service:
    build:
      context: ../..
      dockerfile: services/tracking-service/Dockerfile
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      TRACKING_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/tracking
      TRACKING_KAFKA_ENABLED: "true"
      TRACKING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      TRACKING_KAFKA_CLIENT_ID: tracking-service
      TRACKING_KAFKA_GROUP_ID: tracking-service
      TRACKING_KAFKA_TOPIC: tracking.events
      TRACKING_KAFKA_ORDERS_TOPIC: orders.events
      TRACKING_JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY}
      TRACKING_GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET:?set GATEWAY_INTERNAL_SECRET}
      TRACKING_SERVICE_NAME: tracking-service
      TRACKING_ENVIRONMENT: local
    ports:
      - "8005:8000"
