services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: tracking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tracking"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.9.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "cub zk-ready localhost:2181 30"]
      interval: 5s
      timeout: 10s
      retries: 12
    ports:
      - "2184:2181"

  kafka:
    image: confluentinc/cp-kafka:7.9.0
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_BROKER_ID: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:9092 1 30"]
      interval: 5s
      timeout: 10s
      retries: 12
    ports:
      - "9095:9092"

  tracking-service:
    build:
      context: ../..
      dockerfile: services/tracking-service/Dockerfile
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      TRACKING_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/tracking
      TRACKING_KAFKA_ENABLED: "true"
      TRACKING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      TRACKING_KAFKA_CLIENT_ID: tracking-service
      TRACKING_KAFKA_GROUP_ID: tracking-service
      TRACKING_KAFKA_TOPIC: tracking.events
      TRACKING_KAFKA_ORDERS_TOPIC: orders.events
      TRACKING_JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY}
      TRACKING_GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET:?set GATEWAY_INTERNAL_SECRET}
      TRACKING_SERVICE_NAME: tracking-service
      TRACKING_ENVIRONMENT: local
    ports:
      - "8005:8000"
