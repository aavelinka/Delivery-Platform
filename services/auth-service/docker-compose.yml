services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ../..
      dockerfile: services/auth-service/Dockerfile
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AUTH_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/auth
      AUTH_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY}
      AUTH_GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET:?set GATEWAY_INTERNAL_SECRET}
      AUTH_SERVICE_NAME: auth-service
      AUTH_ENVIRONMENT: local
      AUTH_ACCESS_TOKEN_EXPIRE_MINUTES: 30
      AUTH_REFRESH_TOKEN_EXPIRE_DAYS: 30
      AUTH_BOOTSTRAP_ADMIN_EMAIL: ${AUTH_BOOTSTRAP_ADMIN_EMAIL:-}
      AUTH_BOOTSTRAP_ADMIN_PASSWORD: ${AUTH_BOOTSTRAP_ADMIN_PASSWORD:-}
      AUTH_BOOTSTRAP_ADMIN_FULL_NAME: ${AUTH_BOOTSTRAP_ADMIN_FULL_NAME:-Platform Administrator}
    ports:
      - "8003:8000"
