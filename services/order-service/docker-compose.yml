services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: orders
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orders"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.9.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "cub zk-ready localhost:2181 30"]
      interval: 5s
      timeout: 10s
      retries: 12
    expose:
      - "2181"

  kafka:
    image: confluentinc/cp-kafka:7.9.0
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_BROKER_ID: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:9092 1 30"]
      interval: 5s
      timeout: 10s
      retries: 12
    expose:
      - "9092"

  order-service:
    build:
      context: ../..
      dockerfile: services/order-service/Dockerfile
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      ORDER_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/orders
      ORDER_KAFKA_ENABLED: "true"
      ORDER_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ORDER_KAFKA_CLIENT_ID: order-service
      ORDER_KAFKA_GROUP_ID: order-service
      ORDER_KAFKA_ORDERS_TOPIC: orders.events
      ORDER_KAFKA_COURIERS_TOPIC: couriers.events
      ORDER_JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY}
      ORDER_GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET:?set GATEWAY_INTERNAL_SECRET}
      ORDER_SERVICE_NAME: order-service
      ORDER_ENVIRONMENT: local
    ports:
      - "${ORDER_SERVICE_HOST_PORT:-8000}:8000"
